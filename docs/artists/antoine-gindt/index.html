      <p class="pd-pitch" data-fr="Livret et mise en scène de Rayon N ; mise en scène d'Aliados (Ircam · ManiFeste). Il dirige T&amp;M Paris." data-es="Libreto y dirección de Rayon N; dirección de Aliados (Ircam · ManiFeste). Dirige T&amp;M Paris." data-en="Libretto and staging of Rayon N; staging of Aliados (Ircam · ManiFeste). He directs T&amp;M Paris." data-zh="Rayon N 的编剧与导演；Aliados（Ircam · ManiFeste）的导演。他执掌 T&amp;M Paris。"></p>
      <div class="prose artist-bio-long"><p data-fr="Metteur en scène et producteur, il dirige T&amp;M Paris et accompagne depuis de nombreuses années la création lyrique contemporaine, mettant en dialogue théâtre, musique et image." data-es="Director de escena y productor, dirige T&amp;M Paris y acompaña desde hace muchos años la creación lírica contemporánea, poniendo en diálogo teatro, música e imagen." data-en="A stage director and producer, he directs T&amp;M Paris and has long accompanied contemporary lyric creation, bringing theatre, music and image into dialogue." data-zh="导演与制作人，他执掌 T&amp;M Paris，多年来陪伴当代歌剧创作，让戏剧、音乐与影像彼此对话。"></p><p data-fr="Pour STOPERA!, il signe le livret et la mise en scène de Rayon N et la mise en scène d'Aliados (Ircam · ManiFeste)." data-es="Para STOPERA!, firma el libreto y la dirección de Rayon N y la dirección de Aliados (Ircam · ManiFeste)." data-en="For STOPERA!, he writes the libretto and stages Rayon N, and stages Aliados (Ircam · ManiFeste)." data-zh="他为 STOPERA! 担任 Rayon N 的编剧与导演，并执导 Aliados（Ircam · ManiFeste）。"></p></div>
