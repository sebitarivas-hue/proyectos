      <h1 class="pd-title pd-title--page" data-fr="LIPS Lab : prochaine édition 2028" data-es="LIPS Lab: próxima edición 2028" data-en="LIPS Lab: next edition 2028" data-zh="LIPS Lab：下一届 2028"></h1>
      <figure class="pd-media"><img src="../../assets/projects/lips.jpg" alt="LIPS Lab : prochaine édition 2028" /></figure>
      <p class="pd-pitch" data-fr="Le laboratoire international de prototypes scéniques et sonores revient en 2028, tous les deux ans." data-es="El laboratorio internacional de prototipos escénicos y sonoros vuelve en 2028, cada dos años." data-en="The international laboratory of scenic and sound prototypes returns in 2028, every two years." data-zh="国际舞台与声音原型工作坊将于 2028 年回归，每两年一届。"></p>
      <div class="prose"><p data-fr="LIPS réunit de jeunes artistes de toutes disciplines — composition, mise en scène, arts visuels, théâtre, danse — accompagnés par des artistes confirmés. Un temps d'expérimentation, de co-écriture et de rencontre, où la transmission se fait par la pratique. Appel à candidatures à venir." data-es="LIPS reúne a jóvenes artistas de todas las disciplinas —composición, dirección de escena, artes visuales, teatro, danza— acompañados por artistas consagrados. Un tiempo de experimentación, co-escritura y encuentro, donde la transmisión se hace por la práctica. Convocatoria próximamente." data-en="LIPS brings together young artists from all disciplines — composition, stage direction, visual arts, theatre, dance — mentored by established artists. A time for experimentation, co-writing and encounter, where transmission happens through practice. Call for applications to come." data-zh="LIPS 汇集来自各学科——作曲、导演、视觉艺术、戏剧、舞蹈——的青年艺术家，由资深艺术家陪伴。一段实验、共同书写与相遇的时光，让传承通过实践发生。招募即将公布。"></p></div>
