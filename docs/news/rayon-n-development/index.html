      <h1 class="pd-title pd-title--page" data-fr="Rayon N : l'opéra-film en développement" data-es="Rayon N: la ópera-film en desarrollo" data-en="Rayon N: the film-opera in development" data-zh="Rayon N：影像歌剧开发中"></h1>
      <figure class="pd-media"><img src="../../assets/projects/rayon-n.jpg" alt="Rayon N : l'opéra-film en développement" /></figure>
      <p class="pd-pitch" data-fr="Commande de l'Ensemble intercontemporain, Rayon N entre en production (2026) en vue d'une diffusion en 2027." data-es="Encargo del Ensemble intercontemporain, Rayon N entra en producción (2026) con vistas a una gira en 2027." data-en="Commissioned by the Ensemble intercontemporain, Rayon N enters production (2026) towards a 2027 tour." data-zh="受 Ensemble intercontemporain 委约，Rayon N 进入制作阶段（2026），目标 2027 年巡演。"></p>
      <div class="prose"><p data-fr="Inspiré de la prétendue découverte du « rayon N » par René Blondlot en 1903, l'opéra de Sebastian Rivas (livret et mise en scène d'Antoine Gindt, avec Philippe Béziat) prolonge son questionnement sur la croyance et la construction du réel. L'image, aujourd'hui générée et animée, dialogue avec la musique jouée en direct." data-es="Inspirada en la supuesta invención del «rayo N» por René Blondlot en 1903, la ópera de Sebastian Rivas (libreto y dirección de Antoine Gindt, con Philippe Béziat) prolonga su reflexión sobre la creencia y la construcción de lo real. La imagen, hoy generada y animada, dialoga con la música en vivo." data-en="Inspired by René Blondlot's supposed 1903 discovery of the “N-ray,” Sebastian Rivas's opera (libretto and staging by Antoine Gindt, with Philippe Béziat) extends its inquiry into belief and the construction of reality. Imagery, today generated and animated, converses with live music." data-zh="灵感源自 1903 年 René Blondlot 声称发现的「N 射线」，Sebastian Rivas 的歌剧（Antoine Gindt 编剧与导演，Philippe Béziat 参与）延续其对信念与现实建构的追问。如今生成并动画化的影像与现场音乐对话。"></p></div>
