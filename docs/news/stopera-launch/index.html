      <h1 class="pd-title pd-title--page" data-fr="STOPERA! ouvre sa plateforme" data-es="STOPERA! abre su plataforma" data-en="STOPERA! opens its platform" data-zh="STOPERA! 启动其平台"></h1>
      <figure class="pd-media"><img src="../../assets/og-cover.jpg" alt="STOPERA! ouvre sa plateforme" /></figure>
      <p class="pd-pitch" data-fr="Une plateforme internationale de création, de production, de recherche et de transmission voit le jour à Gentilly." data-es="Una plataforma internacional de creación, producción, investigación y transmisión nace en Gentilly." data-en="An international platform for creation, production, research and transmission launches in Gentilly." data-zh="一个面向创作、制作、研究与传承的国际平台在让蒂伊诞生。"></p>
      <div class="prose"><p data-fr="STOPERA! réunit artistes, interprètes, chercheurs et partenaires culturels autour d'une même question : comment la voix, le corps et le son deviennent présence sur le plateau. La plateforme rassemble créations, recherche et transmission, sous la direction de Sebastian Rivas et avec le soutien de Georges Aperghis comme président d'honneur." data-es="STOPERA! reúne a artistas, intérpretes, investigadores y socios culturales en torno a una misma pregunta: cómo la voz, el cuerpo y el sonido se vuelven presencia en escena. La plataforma reúne creaciones, investigación y transmisión, bajo la dirección de Sebastian Rivas y con el apoyo de Georges Aperghis como presidente de honor." data-en="STOPERA! brings together artists, performers, researchers and cultural partners around a single question: how voice, body and sound become presence on stage. The platform unites creation, research and transmission, directed by Sebastian Rivas and supported by Georges Aperghis as honorary president." data-zh="STOPERA! 汇集艺术家、表演者、研究者与文化伙伴，围绕同一问题：人声、身体与声音如何在舞台上成为在场。平台整合创作、研究与传承，由 Sebastian Rivas 担任艺术指导，并由 Georges Aperghis 担任名誉主席给予支持。"></p></div>
