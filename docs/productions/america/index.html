      <h1 class="pd-title pd-title--page" data-fr="Un monde à brûler" data-es="Un mundo por quemar" data-en="A World to Blast" data-zh="燃尽的世界"></h1>
      <figure class="pd-media"><img src="../../assets/projects/america-scarfo.jpg" alt="Un monde à brûler" /></figure>
      <p class="pd-pitch" data-fr="Opéra qui entrelace les destins d'<em>América Scarfó</em> et de <em>Soledad Rosas</em>, deux femmes liées par l'amour, l'exil et la lutte — l'anarchisme des années 1930 (Argentine, Europe) et les mouvements squat de l'Italie des années 1990. Comme la <em>Lulu</em> de Berg, l'œuvre sonde le pouvoir de l'amour ; mais ici l'amour devient un acte révolutionnaire, affirmation d'autonomie face aux systèmes oppressifs. Musique de Sebastian Rivas, dramaturgie et mise en scène de Marcelo Lombardero." data-es="Ópera que entrelaza los destinos de <em>América Scarfó</em> y <em>Soledad Rosas</em>, dos mujeres unidas por el amor, el exilio y la lucha — el anarquismo de los años 30 (Argentina, Europa) y los movimientos «okupas» de la Italia de los 90. Como la <em>Lulu</em> de Berg, la obra indaga el poder del amor; pero aquí el amor es un acto revolucionario, afirmación de autonomía frente a los sistemas opresivos. Música de Sebastian Rivas, dramaturgia y dirección de Marcelo Lombardero." data-en="An opera weaving together the fates of <em>América Scarfó</em> and <em>Soledad Rosas</em>, two women bound by love, exile and struggle — 1930s anarchism (Argentina, Europe) and the 1990s squat movements of Italy. Like Berg's <em>Lulu</em>, it probes the power of love; but here love becomes a revolutionary act, an assertion of autonomy against oppressive systems. Music by Sebastian Rivas, dramaturgy and staging by Marcelo Lombardero." data-zh="一部歌剧，交织 <em>América Scarfó</em> 与 <em>Soledad Rosas</em> 两位女性的命运——她们因爱、流亡与抗争而相连：1930 年代的无政府主义（阿根廷、欧洲）与 1990 年代意大利的占屋运动。如同贝尔格的《<em>璐璐</em>》，作品探问爱的力量；但在这里，爱成为革命行动，是面对压迫体制的自主宣言。Sebastian Rivas 作曲，Marcelo Lombardero 戏剧构作与导演。"></p>
