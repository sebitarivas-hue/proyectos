      <h1 class="pd-title pd-title--page" data-fr="Insistir" data-es="Insistir" data-en="Insistir" data-zh="Insistir"></h1>
      <figure class="pd-media"><img src="../../assets/projects/insistir.jpg" alt="Insistir" /></figure>
      <p class="pd-pitch" data-fr="Performance scénique pour une interprète seule en scène, portée par Nicola Beller Carbone et construite autour de pièces de Georges Aperghis. En dialogue avec un geste fondateur — la mise en scène d'<em>En attendant Godot</em> par Susan Sontag dans Sarajevo assiégée (1993) —, elle interroge la présence en situation extrême : la voix comme matière, la répétition comme acte, l'insistance comme résistance. Création prévue à Mexico en 2026." data-es="Performance escénica para una intérprete sola en escena, encarnada por Nicola Beller Carbone y construida en torno a piezas de Georges Aperghis. En diálogo con un gesto fundador —la puesta en escena de <em>Esperando a Godot</em> por Susan Sontag en el Sarajevo sitiado (1993)—, interroga la presencia en situación extrema: la voz como materia, la repetición como acto, la insistencia como resistencia. Estreno previsto en México en 2026." data-en="A stage performance for a single performer, embodied by Nicola Beller Carbone and built around works by Georges Aperghis. In dialogue with a founding gesture — Susan Sontag staging <em>Waiting for Godot</em> in besieged Sarajevo (1993) — it questions presence in extreme conditions: voice as material, repetition as act, insistence as resistance. Premiere planned in Mexico City in 2026." data-zh="一部为独奏表演者而作的舞台表演，由 Nicola Beller Carbone 演绎，围绕 Georges Aperghis 的作品构建。它与一个奠基性姿态对话——1993 年 Susan Sontag 在被围困的萨拉热窝执导《<em>等待戈多</em>》——追问极端处境中的在场：人声作为材料，重复作为行动，坚持作为抵抗。预计 2026 年于墨西哥城首演。"></p>
