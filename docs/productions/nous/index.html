      <h1 class="pd-title pd-title--page" data-fr="De l'Innocence" data-es="De l'Innocence" data-en="De l'Innocence" data-zh="De l'Innocence"></h1>
      <figure class="pd-media"><img src="../../assets/projects/nous.jpg" alt="De l'Innocence" /></figure>
      <p class="pd-pitch" data-fr="Opéra de chambre né d'une série de conversations avec Christine Angot. Non pas mettre en musique un thème, mais trouver une forme qui accueille ce qui résiste au langage et au récit : la perte de l'innocence, l'envahissement du réel, l'expérience de la fracture intérieure." data-es="Ópera de cámara nacida de una serie de conversaciones con Christine Angot. No poner en música un tema, sino encontrar una forma que acoja lo que resiste al lenguaje y al relato: la pérdida de la inocencia, la invasión de lo real, la fractura interior." data-en="A chamber opera born from a series of conversations with Christine Angot. Not setting a theme to music, but finding a form that holds what resists language and narrative: the loss of innocence, the flooding of the real, the experience of inner fracture." data-zh="一部室内歌剧，源自与 Christine Angot 的一系列对话。并非为主题谱曲，而是寻找一种能容纳那些抗拒语言与叙事之物的形式：纯真的丧失、现实的侵入、内在断裂的体验。"></p>
