      <p class="pd-eyebrow"><a href="../../index.html#productions" data-fr="← Productions" data-es="← Producciones" data-en="← Productions" data-zh="← 作品"></a> · <span class="pd-tag" data-fr="en cours" data-es="en curso" data-en="ongoing" data-zh="进行中"></span></p>
      <h1 class="pd-title pd-title--page" data-fr="De l'Innocence" data-es="De l'Innocence" data-en="De l'Innocence" data-zh="De l'Innocence"></h1>
      <figure class="pd-media"><img src="../../assets/projects/nous.jpg" alt="De l'Innocence" /></figure>
      <p class="pd-pitch" data-fr="Opéra de chambre né d'une série de conversations avec Christine Angot. Non pas mettre en musique un thème, mais trouver une forme qui accueille ce qui résiste au langage et au récit : la perte de l'innocence, l'envahissement du réel, l'expérience de la fracture intérieure." data-es="Ópera de cámara nacida de una serie de conversaciones con Christine Angot. No poner en música un tema, sino encontrar una forma que acoja lo que resiste al lenguaje y al relato: la pérdida de la inocencia, la invasión de lo real, la fractura interior." data-en="A chamber opera born from a series of conversations with Christine Angot. Not setting a theme to music, but finding a form that holds what resists language and narrative: the loss of innocence, the flooding of the real, the experience of inner fracture." data-zh="一部室内歌剧，源自与 Christine Angot 的一系列对话。并非为主题谱曲，而是寻找一种能容纳那些抗拒语言与叙事之物的形式：纯真的丧失、现实的侵入、内在断裂的体验。"></p>
      <p class="pd-prose pd-prose--lead" data-fr="Le projet ne part pas d'un livret achevé mais d'une parole vivante. Au fil des rencontres avec Christine Angot, ce sont des fragments — phrases dites, reprises, abandonnées, des silences, des hésitations — qui deviennent la matière première de l'œuvre. La voix de l'écrivaine, sa manière de buter sur certains mots, de revenir sur ce qui ne peut pas se dire, oriente l'écriture musicale autant que le texte lui-même." data-es="El proyecto no parte de un libreto acabado sino de una palabra viva. A lo largo de los encuentros con Christine Angot, son fragmentos —frases dichas, retomadas, abandonadas, silencios, vacilaciones— los que se vuelven la materia prima de la obra. La voz de la escritora, su manera de tropezar con ciertas palabras, de volver sobre lo que no puede decirse, orienta la escritura musical tanto como el propio texto." data-en="The project does not begin from a finished libretto but from living speech. Across the encounters with Christine Angot, it is fragments — sentences spoken, taken up again, abandoned, silences, hesitations — that become the work's raw material. The writer's voice, the way she stumbles on certain words and returns to what cannot be said, shapes the musical writing as much as the text itself." data-zh="这个项目并非始于一部完成的脚本，而是源于鲜活的言语。在与 Christine Angot 的多次相遇中，正是那些片段——说出的、重提的、舍弃的句子，沉默与迟疑——成为作品的原材料。作家的声音，她在某些词语上的踌躇、对那些无法言说之物的反复回返，与文本本身同样地塑造着音乐书写。"></p>
      <p class="pd-prose pd-prose--lead" data-fr="L'innocence n'est pas ici une nostalgie ni un état perdu à reconquérir, mais un seuil : l'instant où le monde cesse d'être évident, où l'enfance se heurte à ce qu'elle ne pouvait pas prévoir. L'opéra cherche à tenir ce seuil sur le plateau — un espace resserré, un petit ensemble instrumental, une électronique discrète — pour que l'auditeur soit au plus près de la fracture, sans explication ni mise à distance." data-es="La inocencia no es aquí una nostalgia ni un estado perdido que reconquistar, sino un umbral: el instante en que el mundo deja de ser evidente, en que la infancia choca con lo que no podía prever. La ópera busca sostener ese umbral en escena —un espacio reducido, un pequeño conjunto instrumental, una electrónica discreta— para que el oyente esté lo más cerca posible de la fractura, sin explicación ni distancia." data-en="Innocence here is neither nostalgia nor a lost state to be reconquered, but a threshold: the moment when the world ceases to be self-evident, when childhood collides with what it could not foresee. The opera seeks to hold that threshold on stage — a tight space, a small instrumental ensemble, discreet electronics — so that the listener stands as close as possible to the fracture, without explanation or distance." data-zh="此处的纯真既非怀旧，也不是有待重夺的失落状态，而是一道门槛：世界不再不言自明的那一刻，童年撞上它无法预见之物的那一刻。这部歌剧力图在舞台上守住这道门槛——一个收紧的空间、一支小型器乐组、克制的电子声响——让听者尽可能贴近那道断裂，无需解释，也不被拉开距离。"></p>
