      <h1 class="pd-title pd-title--page" data-fr="<span class=&quot;it&quot;>input / body / output</span>" data-es="<span class=&quot;it&quot;>input / body / output</span>" data-en="<span class=&quot;it&quot;>input / body / output</span>" data-zh="<span class=&quot;it&quot;>input / body / output</span>"></h1>
      <figure class="pd-media"><img src="../../assets/projects/rut.jpg" alt="input / body / output" /></figure>
      <p class="pd-pitch" data-fr="Performance pour cheffe solo, capteurs, son spatialisé et vidéo interactive — sous-titrée « Conducting the Invisible ». Le geste de direction de Rut Schreiner, capté en temps réel, génère, module et sculpte le son : le corps devient instrument, la direction d'orchestre, matière musicale." data-es="Performance para directora sola, sensores, sonido espacializado y vídeo interactivo —subtitulada «Conducting the Invisible». El gesto de dirección de Rut Schreiner, captado en tiempo real, genera, modula y esculpe el sonido: el cuerpo se vuelve instrumento, la dirección de orquesta, materia musical." data-en="A performance for solo conductor, sensors, spatialised sound and interactive video — subtitled “Conducting the Invisible.” Rut Schreiner's conducting gesture, captured in real time, generates, modulates and sculpts sound: the body becomes an instrument, conducting becomes musical material." data-zh="一场为独奏指挥、传感器、空间化声音与互动影像而作的表演——副标题「Conducting the Invisible」。Rut Schreiner 的指挥手势经实时捕捉，生成、调制并雕塑声音：身体成为乐器，指挥成为音乐素材。"></p>
