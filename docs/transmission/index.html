      <h1 class="pd-title pd-title--page" data-fr="Transmission" data-es="Transmisión" data-en="Transmission" data-zh="传承"></h1>
      <p class="pd-pitch" data-fr="Chez STOPERA!, chaque œuvre est aussi un espace de transmission : ce qui peut se partager, s'apprendre, s'explorer ou se transmettre autour d'elle — ateliers, rencontres, mentorat, médiation. Voici les productions présentées sous cet angle." data-es="En STOPERA!, cada obra es también un espacio de transmisión: lo que puede compartirse, aprenderse, explorarse o transmitirse en torno a ella — talleres, encuentros, mentoría, mediación. Aquí están las producciones presentadas desde esta perspectiva." data-en="At STOPERA!, every work is also a space of transmission: what can be shared, learned, explored or passed on around it — workshops, encounters, mentoring, mediation. Here are the productions seen through that lens." data-zh="在 STOPERA!，每一部作品也是一个传承的空间：围绕它可以分享、学习、探索或传递之物——工作坊、相遇、师徒指导、导赏。以下是从这一角度呈现的作品。"></p>
      <div class="tx-group">
        <h3 class="tx-prod"><a href="../productions/ooo/" data-fr="OOO" data-es="OOO" data-en="OOO" data-zh="OOO"></a></h3>
        <p class="tx-text" data-fr="Ateliers sur la lutherie d'objets et la dramaturgie post-humaine — faire chanter la matière et le son." data-es="Talleres sobre la lutería de objetos y la dramaturgia posthumana — hacer cantar la materia y el sonido." data-en="Workshops on object-instruments and post-human dramaturgy — making matter and sound sing." data-zh="围绕物件乐器与后人类戏剧构作的工作坊——让物质与声音歌唱。"></p>
        <p class="tx-terr"><span class="tx-terr-k" data-fr="Territoire" data-es="Territorio" data-en="Territory" data-zh="在地"></span> <span data-fr="Un pont entre Buenos Aires et Lyon, porté en tournée internationale." data-es="Un puente entre Buenos Aires y Lyon, llevado en gira internacional." data-en="A bridge between Buenos Aires and Lyon, taken on international tour." data-zh="连接布宜诺斯艾利斯与里昂的桥梁，并展开国际巡演。"></span></p>
      </div>
      <div class="tx-group">
        <h3 class="tx-prod"><a href="../productions/war-madrigals/" data-fr="War Madrigals" data-es="War Madrigals" data-en="War Madrigals" data-zh="War Madrigals"></a></h3>
        <p class="tx-text" data-fr="Travail vocal en atelier autour du madrigal et de l'écriture pour six voix." data-es="Trabajo vocal en taller en torno al madrigal y la escritura para seis voces." data-en="Vocal workshops around the madrigal and writing for six voices." data-zh="围绕牧歌与六声部写作的人声工作坊。"></p>
        <p class="tx-terr"><span class="tx-terr-k" data-fr="Territoire" data-es="Territorio" data-en="Territory" data-zh="在地"></span> <span data-fr="Porté par le réseau des ensembles vocaux, en France et au-delà." data-es="Llevado por la red de conjuntos vocales, en Francia y más allá." data-en="Carried by the network of vocal ensembles, in France and beyond." data-zh="依托人声合奏团的网络，在法国及更广地区呈现。"></span></p>
      </div>
      <div class="tx-group">
        <h3 class="tx-prod"><a href="../productions/rayon-n/" data-fr="Rayon N" data-es="Rayon N" data-en="Rayon N" data-zh="Rayon N"></a></h3>
        <p class="tx-text" data-fr="Partage du processus opéra-film : musique, image générée et intelligence artificielle." data-es="Compartir el proceso ópera-film: música, imagen generada e inteligencia artificial." data-en="Sharing the film-opera process: music, generated image and artificial intelligence." data-zh="分享影像歌剧的创作流程：音乐、生成影像与人工智能。"></p>
        <p class="tx-terr"><span class="tx-terr-k" data-fr="Territoire" data-es="Territorio" data-en="Territory" data-zh="在地"></span> <span data-fr="Développé à Gentilly, au Lavoir Numérique, en lien avec la scène musicale contemporaine." data-es="Desarrollado en Gentilly, en el Lavoir Numérique, en diálogo con la escena musical contemporánea." data-en="Developed in Gentilly, at the Lavoir Numérique, in dialogue with the contemporary music scene." data-zh="于让蒂伊的 Lavoir Numérique 开发，与当代音乐场景对话。"></span></p>
      </div>
      <div class="tx-group">
        <h3 class="tx-prod"><a href="../productions/nous/" data-fr="De l'Innocence" data-es="De l'Innocence" data-en="De l'Innocence" data-zh="De l'Innocence"></a></h3>
        <p class="tx-text" data-fr="Partage de la méthode : composer à partir de la parole vivante, en ateliers d'écriture et de voix." data-es="Compartir el método: componer a partir de la palabra viva, en talleres de escritura y voz." data-en="Sharing the method: composing from living speech, in writing and voice workshops." data-zh="分享创作方法：从鲜活的言语出发作曲，开展写作与人声工作坊。"></p>
        <p class="tx-terr"><span class="tx-terr-k" data-fr="Territoire" data-es="Territorio" data-en="Territory" data-zh="在地"></span> <span data-fr="Enraciné en France, soutenu par le CNM ; coproductions en cours de montage." data-es="Enraizado en Francia, apoyado por el CNM; coproducciones en construcción." data-en="Rooted in France, supported by the CNM; coproductions being assembled." data-zh="扎根法国，获 CNM 支持；联合制作筹备中。"></span></p>
      </div>
      <div class="tx-group">
        <h3 class="tx-prod"><a href="../productions/rut/" data-fr="<span class=&quot;it&quot;>input / body / output</span>" data-es="<span class=&quot;it&quot;>input / body / output</span>" data-en="<span class=&quot;it&quot;>input / body / output</span>" data-zh="<span class=&quot;it&quot;>input / body / output</span>"></a></h3>
        <p class="tx-text" data-fr="Masterclass sur le geste de direction comme matière sonore et l'électronique en temps réel." data-es="Masterclass sobre el gesto de dirección como materia sonora y la electrónica en tiempo real." data-en="Masterclass on the conducting gesture as sound material and real-time electronics." data-zh="关于指挥手势作为声音素材与实时电子的大师班。"></p>
        <p class="tx-terr"><span class="tx-terr-k" data-fr="Territoire" data-es="Territorio" data-en="Territory" data-zh="在地"></span> <span data-fr="Créé en résidence, à la croisée du concert et de la performance." data-es="Creado en residencia, en el cruce entre concierto y performance." data-en="Created in residency, at the crossroads of concert and performance." data-zh="驻地创作，处于音乐会与表演的交汇处。"></span></p>
      </div>
      <div class="tx-group">
        <h3 class="tx-prod"><a href="../productions/fame/" data-fr="[FAM]E" data-es="[FAM]E" data-en="[FAM]E" data-zh="[FAM]E"></a></h3>
        <p class="tx-text" data-fr="La médiation d'Olivia Martin fait de ce récital un espace de parole autour du féminin, ouvert à tou·te·s." data-es="La mediación de Olivia Martin convierte el recital en un espacio de palabra en torno a lo femenino, abierto a todos." data-en="Olivia Martin's mediation turns the recital into a space for speech around the feminine, open to all." data-zh="Olivia Martin 的导赏让这场独奏会成为面向所有人、围绕「女性」的发声空间。"></p>
        <p class="tx-terr"><span class="tx-terr-k" data-fr="Territoire" data-es="Territorio" data-en="Territory" data-zh="在地"></span> <span data-fr="Créé à l'Auditorium — Orchestre National de Lyon, avec le GRAME." data-es="Creado en el Auditorium — Orchestre National de Lyon, con el GRAME." data-en="Created at the Auditorium — Orchestre National de Lyon, with GRAME." data-zh="于里昂大礼堂——国家管弦乐团创作，与 GRAME 合作。"></span></p>
      </div>
      <div class="tx-group">
        <h3 class="tx-prod"><a href="../productions/snow-on-her-lips/" data-fr="Snow on Her Lips" data-es="Snow on Her Lips" data-en="Snow on Her Lips" data-zh="Snow on Her Lips"></a></h3>
        <p class="tx-text" data-fr="Atelier transdisciplinaire : théâtre musical, danse, vidéo et électronique réunis." data-es="Taller transdisciplinar: teatro musical, danza, vídeo y electrónica reunidos." data-en="Cross-disciplinary workshop: music theatre, dance, video and electronics together." data-zh="跨学科工作坊：音乐剧场、舞蹈、影像与电子的汇聚。"></p>
        <p class="tx-terr"><span class="tx-terr-k" data-fr="Territoire" data-es="Territorio" data-en="Territory" data-zh="在地"></span> <span data-fr="Pensé pour le public du Printemps des Arts, sur la Riviera." data-es="Pensado para el público del Printemps des Arts, en la Riviera." data-en="Made for the Printemps des Arts audience, on the Riviera." data-zh="为蒙特卡洛艺术之春的观众而作，位于里维埃拉。"></span></p>
      </div>
      <div class="tx-group">
        <h3 class="tx-prod"><a href="../productions/otages/" data-fr="Otages" data-es="Otages" data-en="Otages" data-zh="Otages"></a></h3>
        <p class="tx-text" data-fr="Rencontres autour de l'adaptation littéraire à l'opéra et du travail vocal contemporain." data-es="Encuentros en torno a la adaptación literaria a la ópera y el trabajo vocal contemporáneo." data-en="Encounters around literary adaptation to opera and contemporary vocal work." data-zh="围绕文学改编为歌剧与当代人声创作的相遇。"></p>
        <p class="tx-terr"><span class="tx-terr-k" data-fr="Territoire" data-es="Territorio" data-en="Territory" data-zh="在地"></span> <span data-fr="Ancré à Lyon, en lien avec les scènes lyriques et les publics de la région." data-es="Anclado en Lyon, en relación con las escenas líricas y los públicos de la región." data-en="Anchored in Lyon, connected to opera stages and regional audiences." data-zh="扎根里昂，与歌剧舞台及地区观众相连。"></span></p>
      </div>
      <div class="tx-group">
        <h3 class="tx-prod"><a href="../productions/aliados/" data-fr="Aliados" data-es="Aliados" data-en="Aliados" data-zh="Aliados"></a></h3>
        <p class="tx-text" data-fr="Partage de la lutherie temps réel (voix et électronique Ircam) en conférences et masterclass." data-es="Compartir la lutería en tiempo real (voz y electrónica Ircam) en conferencias y masterclass." data-en="Sharing real-time instrument design (voice and Ircam electronics) in talks and masterclasses." data-zh="在讲座与大师班中分享实时电子乐器设计（人声与 Ircam 电子）。"></p>
        <p class="tx-terr"><span class="tx-terr-k" data-fr="Territoire" data-es="Territorio" data-en="Territory" data-zh="在地"></span> <span data-fr="Enraciné dans la scène parisienne de la création sonore et diffusé à l'international." data-es="Enraizado en la escena parisina de la creación sonora y difundido internacionalmente." data-en="Rooted in the Paris sound-creation scene and toured internationally." data-zh="扎根巴黎的声音创作场景，并展开国际巡演。"></span></p>
      </div>
      <div class="tx-group">
        <h3 class="tx-prod"><a href="../productions/insistir/" data-fr="Insistir" data-es="Insistir" data-en="Insistir" data-zh="Insistir"></a></h3>
        <p class="tx-text" data-fr="Transmission du répertoire d'Aperghis et du théâtre musical à de jeunes interprètes." data-es="Transmisión del repertorio de Aperghis y del teatro musical a jóvenes intérpretes." data-en="Passing on Aperghis's repertoire and music theatre to young performers." data-zh="向年轻表演者传授 Aperghis 的作品与音乐剧场。"></p>
        <p class="tx-terr"><span class="tx-terr-k" data-fr="Territoire" data-es="Territorio" data-en="Territory" data-zh="在地"></span> <span data-fr="Porté par STOPERA! autour de la soprano Nicola Beller Carbone." data-es="Impulsado por STOPERA! en torno a la soprano Nicola Beller Carbone." data-en="Carried by STOPERA! around soprano Nicola Beller Carbone." data-zh="由 STOPERA! 围绕女高音 Nicola Beller Carbone 推进。"></span></p>
      </div>
      <div class="tx-group">
        <h3 class="tx-prod"><a href="../productions/mamma-roma/" data-fr="Mamma Roma" data-es="Mamma Roma" data-en="Mamma Roma" data-zh="Mamma Roma"></a></h3>
        <p class="tx-text" data-fr="Ateliers sur le geste scénique et l'objet — la table — comme espace dramaturgique." data-es="Talleres sobre el gesto escénico y el objeto —la mesa— como espacio dramatúrgico." data-en="Workshops on stage gesture and the object — the table — as dramaturgical space." data-zh="围绕舞台动作与物件（餐桌）作为戏剧空间的工作坊。"></p>
        <p class="tx-terr"><span class="tx-terr-k" data-fr="Territoire" data-es="Territorio" data-en="Territory" data-zh="在地"></span> <span data-fr="Création à Buenos Aires, en dialogue avec la scène lyrique argentine." data-es="Estreno en Buenos Aires, en diálogo con la escena lírica argentina." data-en="Premiering in Buenos Aires, in dialogue with the Argentine opera scene." data-zh="于布宜诺斯艾利斯首演，与阿根廷歌剧场景对话。"></span></p>
      </div>
      <div class="tx-group">
        <h3 class="tx-prod"><a href="../productions/america/" data-fr="Un monde à brûler" data-es="Un mundo por quemar" data-en="A World to Blast" data-zh="燃尽的世界"></a></h3>
        <p class="tx-text" data-fr="Échanges autour de l'opéra engagé et de l'histoire anarchiste portée à la scène." data-es="Intercambios en torno a la ópera comprometida y la historia anarquista llevada a escena." data-en="Exchanges around politically engaged opera and anarchist history brought to the stage." data-zh="围绕介入性歌剧与搬上舞台的无政府主义历史的交流。"></p>
        <p class="tx-terr"><span class="tx-terr-k" data-fr="Territoire" data-es="Territorio" data-en="Territory" data-zh="在地"></span> <span data-fr="Création à Mexico, mise en scène de Marcelo Lombardero." data-es="Estreno en México, dirección de Marcelo Lombardero." data-en="Premiere in Mexico City, staged by Marcelo Lombardero." data-zh="墨西哥城首演，Marcelo Lombardero 执导。"></span></p>
      </div>
      <div class="tx-group">
        <h3 class="tx-prod"><a href="../lips/" data-fr="LIPS Lab" data-es="LIPS Lab" data-en="LIPS Lab" data-zh="LIPS Lab"></a></h3>
        <p class="tx-text" data-fr="LIPS est lui-même un espace de transmission : prototypage, mentorat et partage entre artistes." data-es="LIPS es en sí mismo un espacio de transmisión: prototipado, mentoría e intercambio entre artistas." data-en="LIPS is itself a space of transmission: prototyping, mentoring and exchange between artists." data-zh="LIPS 本身即是传承的空间：原型创作、师徒指导与艺术家之间的交流。"></p>
        <p class="tx-terr"><span class="tx-terr-k" data-fr="Territoire" data-es="Territorio" data-en="Territory" data-zh="在地"></span> <span data-fr="Un réseau de partenaires en France et à l'international, tous les deux ans." data-es="Una red de socios en Francia y en el extranjero, cada dos años." data-en="A network of partners in France and abroad, every two years." data-zh="每两年一届，连接法国与国际的伙伴网络。"></span></p>
